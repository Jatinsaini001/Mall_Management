{% extends "base.html" %}
{% block title %}Edit Product — MallOS{% endblock %}
{% block page_label %}Inventory{% endblock %}
{% block page_heading %}Edit Product{% endblock %}
{% block content %}
<div style="max-width:600px">
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">Edit: {{ product.name }}</h2>
            <a href="{{ url_for('inventory') }}" class="card-link">← Back</a>
        </div>
        <form method="POST" class="form-grid">
            <div class="form-group"><label class="form-label">Product Name *</label><input type="text" name="name" class="form-input" value="{{ product.name }}" required></div>
            <div class="form-group"><label class="form-label">SKU</label><input type="text" name="sku" class="form-input" value="{{ product.sku or '' }}"></div>
            <div class="form-group"><label class="form-label">Category</label>
                <select name="category" class="form-input">
                    {% for cat in ['Clothing','Electronics','Food & Beverage','Jewellery','Cosmetics','Footwear','Accessories','Sports','Home','Other'] %}
                    <option {% if product.category == cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group"><label class="form-label">Unit</label>
                <select name="unit" class="form-input">
                    {% for u in ['pcs','kg','ltr','box','pair'] %}
                    <option {% if product.unit == u %}selected{% endif %}>{{ u }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group"><label class="form-label">Selling Price (₹) *</label><input type="number" name="price" class="form-input" value="{{ product.price }}" min="0" step="0.01" required></div>
            <div class="form-group"><label class="form-label">Cost Price (₹)</label><input type="number" name="cost" class="form-input" value="{{ product.cost or 0 }}" min="0" step="0.01"></div>
            <div class="form-group"><label class="form-label">Stock Qty *</label><input type="number" name="stock" class="form-input" value="{{ product.stock }}" min="0" required></div>
            <div class="form-group"><label class="form-label">Low Stock Alert</label><input type="number" name="low_stock_alert" class="form-input" value="{{ product.low_stock_alert or 5 }}" min="0"></div>
            <div class="form-group form-full" style="display:flex;gap:10px">
                <button type="submit" class="btn btn-primary" style="flex:1">Save Changes</button>
                <a href="{{ url_for('inventory') }}" class="btn btn-cancel" style="flex:1;text-align:center">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
